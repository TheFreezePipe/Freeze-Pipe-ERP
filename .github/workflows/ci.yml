name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref. Saves
# minutes when someone pushes a fixup commit before the previous run
# finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Build expects these env vars to be present (env.ts hard-fails on
    # prod without them; lower envs accept placeholders). We don't put
    # real prod creds in CI — placeholders satisfy the build, and the
    # actual deploy uses Vercel project env vars at runtime.
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
      VITE_APP_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        # Lint is informational right now (the codebase has accumulated
        # rules). Treat as a soft gate so a stray `any` doesn't block a
        # type-clean PR. Remove `continue-on-error` once the lint sweep
        # is done.
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
